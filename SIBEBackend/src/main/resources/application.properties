# ================================================
# SIBE - Application Properties
# Todas las propiedades son configurables via variables de entorno.
# Sintaxis: ${VARIABLE:valor_por_defecto}
# ================================================

# General
spring.application.name=${APP_NAME:SIBE}

# Port
server.port=${SERVER_PORT:8080}

# Context-Path
server.servlet.context-path=/api

# Data Base (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sibe_db2}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.main.allow-bean-definition-overriding=true

# CORS - Origenes permitidos (separados por coma si son multiples)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost}

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:sibeapplicationuco@gmail.com}
spring.mail.password=${MAIL_PASSWORD:atsiysuskgnqccrk}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
app.jwt.secret=${JWT_SECRET:jxgEQeXHuPq8VdbyYFNkANdudQ53YUn4}

# Admin seed
app.admin.default-password=${ADMIN_DEFAULT_PASSWORD:Administrador123}

# File upload limits
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:50MB}
